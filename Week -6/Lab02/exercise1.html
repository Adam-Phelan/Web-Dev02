<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Helpers Exercise 1</title>
</head>

<body>
<food></food>
<script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.8/handlebars.min.js"></script>
<script id="Exercise1" type="text/x-handlebars-template">
  <h2> {{description}}</h2>
  <ul>
    {{#each ingredients}}
    <li>{{quantity}} {{name}}</li>
    {{/each}}
  </ul>
</script>


<script>

  const recipe = {
    description: 'Yummy Chicken Noodle Soup',
    ingredients: [
      { quantity: "1 cup", name: 'Chicken' },
      { quantity: "3 nanoliters", name: 'Stock' },
      { quantity: "12", name: 'Noodles' }
    ]
  }


  let template = Handlebars.compile(document.querySelector('#Exercise1').innerHTML);

  let output = template(recipe);

  document.querySelector('food').innerHTML = output;


</script>
</body>

</html>
