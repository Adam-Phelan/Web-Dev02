<!DOCTYPE html>
<html lang="en" >

<head>
  <meta charset="UTF-8">
  <title>Template Exercise 1</title>
</head>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.8/handlebars.min.js"></script>
<script id="Exercise1" type="text/x-handlebars-template">
<p>You can find me in <b>{{city}}</b>. My adress is <b>{{number}}{{street}}.</b></p>

</script>
<script>

const context={
    "city": "London",
    "street": "Baker Street",
    "number": "221B"
}

let template = Handlebars.compile(document.querySelector('#Exercise1').innerHTML);
let output = template(context);
document.body.innerHTML = output;

</script>
</body>
</html>
