<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Lab 2 Array (Looping through an array)</title>
</head>

<body>
    <h1>Array (Looping through an array)</h1>
    <p></p>
    <script>

        const numbers = [1, 12, 4, 18, 9, 7, 11, 3, 50, 5, 6]
        let para = document.querySelector('p');
        para.insertAdjacentHTML('beforeend', `<b>${numbers}</b><br>`);
        para.insertAdjacentHTML('beforeend', `<br><b>Loop through the numbers.</b><br>`)
        for (const num1 of numbers) {
            para.insertAdjacentHTML('beforeend', `${num1}<br>`)
        }
        
        para.insertAdjacentHTML('beforeend', 'loop through the numbers. if greather than 5 display them <br></br>')
        for (const num2 of numbers) {
            if(num2 > 5)
            para.insertAdjacentHTML('beforeend', `${num2}<br>`)
        }

    </script>
</body>

</html>
