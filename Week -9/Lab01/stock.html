<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Manipulate Objects</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <h1>Car Sales</h1>
  <div id="container">
    <nav>
      <form id="searchForm">
        <div class="form-row">
          <label for="search">Search Cars</label>
          <input type="text" id="search" name="search" placeholder="Search by make" size="30">
        </div>
      </form>
      <ul>
        <li><a href="index.html">Add Stock</a></li>
        <li><a id="active" href="stock.html">View Stock</a></li>
      </ul>
    </nav>


    <main id="main2">
      <section id="buttons">
        <button id="years">Sort by Year</button>
        <button id="colours">Sort by Colour</button>
        <button id="reset">Reset</button>
      </section>
      <p id="car"></p>
    </main>


  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.8/handlebars.min.js"></script>
  <script id="card-template" type="text/x-handlebars-template">

  {{#if this}}
    <div class="cards">
     {{#each this}}
      <div class="card">
       <div id = "image">
        <img src="{{img}}" alt="" >
       </div>
       <div class="text">
        <h2> </h2>
        <p> </p>
      
        <div id="outer">
         <div class = "inner">
          <span><i class="fa fa-calendar">{{year}}</i> </span>
          <span><i class="fa fa-paint-brush">{{formatColour colour}}</i> </span>
         </div>
         <div class="inner">
          <span><i class="fa fa-tachometer">{{formatKms kms}}</i></span>
          <span><i class="fa fa-car">{{make}}</i> </span>
         </div>
        </div>
        <p><i class="fa fa-eur">{{formatPrice price}}</i> </p>
       </div>
      </div>
     {{/each}}
    </div>
  {{/if}}
  
  </tbody>
  </script>
  <script src="js/code.js"></script>
  <script>

    let filteredcars = carData.slice();

    const para = document.querySelector("#car");
    let years = document.querySelector('#years');
    let colours = document.querySelector('#colours');
    let reset = document.querySelector('#reset');
    let template = Handlebars.compile(document.querySelector("#card-template").innerHTML);


    reset.addEventListener('click', (evt) => displayRecs(carData, para))

    years.addEventListener("click", (evt) => {
      filteredcars.sort((a, b) => b.year - a.year);
      displayRecs(filteredcars, para);
    });

    colours.addEventListener("click", (evt) => {
      filteredcars.sort((a, b) => {
        if (a.colour > b.colour) return 1;
        if (a.colour < b.colour) return -1;
      });
      displayRecs(filteredcars, para);
    });


    searchInput.addEventListener("input", () => {
      const searchQuery = searchInput.value.trim().toLowerCase();
      filteredcars = carData.filter(car => car.make.toLowerCase().startsWith(searchQuery));
      displayRecs(filteredcars, para);
    });

    displayRecs(carData, para)



  </script>
</body>

</html>
