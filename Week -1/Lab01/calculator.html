 <body>
 <h1>Calculator</h1>
 <p>Look in the console for output</p>
 <script>
    let num1=parseInt(prompt('Enter the first a Number',''));
    console.log(`The first number is ${num1}`);

    let num2=parseInt(prompt('Enter the Second Number',''));
    console.log(`The second number is ${num2}`);

    console.log(num1 + num2);
    console.log(num1 - num2);
    console.log(num1 * num2);
    (num2 != 0) ? console.log(num1 / num2) : console.log("Cannot divide by zero");

 </script>
