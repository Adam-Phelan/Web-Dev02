 <body>
 <h1>Switch Statement</h2>
 <p>Look in the console for output</p>
 <script>
    let Colour=prompt("Please enter a colour red yellow green ")
    switch (Colour) {
  case 'red':
    console.log(`red -> stop`);
    break;
  case 'yellow':
   console.log(`yellow -> slow down`);
    break;
      case 'green':
   console.log(`green -> go`);
    break;
  default:
    console.log(`invalid colour`);
}

 </script>
 </body>
 </html>
