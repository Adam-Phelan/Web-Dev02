 <h1>For Loop</h1>
 <p>Look in the console for output</p>
 <script>
   let total = 0;
   let count = 0;
    for (num=2; num<=20; num=num+2)
 {
    console.log(`${num}`);
    count++;
    total = num + total;
 }
 console.log(total);
 console.log(count);
 console.log(`the avarage is ${total / count}`);


 </script>
