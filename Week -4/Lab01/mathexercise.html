<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<title>Math Library</title>
	<style>
		body {
			width: 400px;
			margin: 0 auto;
		}

		p {
			border: solid black 1px;
			height: 20px;
		}
	</style>
</head>

<body>
	<h1>The Math Library</h1>
	<p id="num"></p>
	<p id="area"></p>
	<p id="circumference"></p>
	<button>Circle Calculations</button>
	<script>
		const btn = document.querySelector('button');

		btn.addEventListener('click', (evt) => {
			let radiusValue = parseInt(prompt("Enter a number ", ""))
			document.querySelector(`#num`).textContent = `The raduis input is ${radiusValue}.`;

			let area = Math.pow(radiusValue,2)* Math.PI
			document.querySelector(`#area`).textContent = `The area of the circle is ${area.toFixed(5)}.`;

			let circumference =  2 * Math.PI * radiusValue;
			document.querySelector(`#circumference`).textContent = `The circumference is ${circumference.toFixed(5)}.`;

		})
	</script>
</body>

</html>
